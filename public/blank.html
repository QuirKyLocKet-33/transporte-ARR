<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente - TransCarga ARR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .sky {
            position: fixed; inset: 0;
            background: linear-gradient(180deg,
                #020510 0%, #0a1628 35%, #0d2142 55%, #1a3a2a 75%, #0e1a0e 100%);
            z-index: 0;
        }
        .stars { position: fixed; inset: 0; z-index: 1; }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--d) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: var(--min); transform: scale(1); }
            to   { opacity: 1; transform: scale(1.4); }
        }
        .moon {
            position: fixed; top: 60px; right: 120px;
            width: 70px; height: 70px; border-radius: 50%;
            background: radial-gradient(circle at 35% 40%, #fffde7, #f4e67a 60%, #c8a800);
            box-shadow: 0 0 40px 15px rgba(255,230,80,0.25), 0 0 80px 30px rgba(255,210,0,0.1);
            z-index: 2;
        }
        .mountains {
            position: fixed; bottom: 130px; left: 0;
            width: 100%; height: 220px; z-index: 3;
        }
        .mountains svg { width: 100%; height: 100%; }

        /* Carretera: 140px de alto */
        .road {
            position: fixed; bottom: 0; left: 0;
            width: 100%; height: 140px;
            background: linear-gradient(180deg, #1a1a1a 0%, #222 60%, #2a2a2a 100%);
            z-index: 4; overflow: hidden;
        }
        /* franja gris superior de la carretera: top 28px */
        .road::before {
            content: ''; position: absolute;
            top: 28px; left: 0; width: 100%; height: 8px;
            background: rgba(255,255,255,0.07);
        }
        /* líneas amarillas: top 50% = 70px desde arriba = 70px desde abajo */
        .road-lines-track {
            position: absolute;
            top: 50%;
            width: 200%; height: 6px;
            display: flex;
            animation: roadScroll 1.6s linear infinite;
            will-change: transform;
        }
        @keyframes roadScroll {
            from { transform: translateY(-50%) translateX(0); }
            to   { transform: translateY(-50%) translateX(-50%); }
        }
        .road-seg {
            width: 80px; height: 6px;
            background: #f39c12; border-radius: 3px;
            flex-shrink: 0; margin-right: 80px;
        }

        /* ── TRUCK CLIP CONTAINER ── */
        .truck-clip {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
        }
        .truck-lane {
            position: absolute;
            bottom: 70px;
            left: 0;
            animation: truckRide 9s linear infinite;
            will-change: transform;
        }
        @keyframes truckRide {
            0%   { transform: translateX(-600px); }
            100% { transform: translateX(110vw); }
        }
        .truck-wrap {
            position: relative;
            display: inline-block;
        }
        .truck-img {
            width: 560px;
            height: auto;
            display: block;
        }


        /* Humo escape lateral */
        .smoke-wrap {
            position: absolute;
            top: 2px; right: 140px;
            pointer-events: none;
        }
        .smoke {
            position: absolute;
            bottom: 0; left: 50%;
            border-radius: 50%;
            background: rgba(200,200,200,0.5);
            animation: puff 1.5s ease-out infinite;
        }
        .smoke-1 { width: 9px;  height: 9px;  animation-delay: 0s;   transform: translateX(-50%); }
        .smoke-2 { width: 13px; height: 13px; animation-delay: 0.5s; bottom: 12px; transform: translateX(-50%); }
        .smoke-3 { width: 17px; height: 17px; animation-delay: 1.0s; bottom: 26px; transform: translateX(-50%); }
        @keyframes puff {
            0%   { opacity: 0.7; transform: translateX(-50%) scale(1); }
            100% { opacity: 0;   transform: translateX(-50%) scale(2.8) translateY(-24px); }
        }

        /* Faro delantero */
        .headlight {
            position: absolute;
            bottom: 54px; right: 2px;
            width: 10px; height: 7px;
            background: #fffde7; border-radius: 2px;
            box-shadow: 0 0 12px 7px rgba(255,253,200,0.7),
                        40px 0 70px 35px rgba(255,253,200,0.07);
        }

        .fog {
            position: fixed; bottom: 100px; left: 0;
            width: 100%; height: 80px;
            background: linear-gradient(180deg, transparent, rgba(20,30,20,0.4));
            z-index: 5; pointer-events: none;
        }

        /* ── CONTENIDO ── */
        .content {
            position: relative; z-index: 20;
            text-align: center; padding: 2rem;
            margin-bottom: 160px;
        }
        .badge {
            display: inline-block;
            background: rgba(243,156,18,0.15);
            border: 1px solid rgba(243,156,18,0.4);
            color: #f39c12;
            font-size: 0.75rem; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            padding: 6px 20px; border-radius: 50px;
            margin-bottom: 1.5rem;
        }
        .content h1 {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 800; color: white;
            line-height: 1.1; margin-bottom: 0.5rem;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .content h1 span { color: #e63946; display: block; }
        .content p {
            color: rgba(255,255,255,0.65);
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            font-weight: 300; max-width: 500px;
            margin: 1rem auto 2rem; line-height: 1.7;
        }
        .divider {
            width: 60px; height: 3px;
            background: linear-gradient(90deg, #e63946, #f39c12);
            border-radius: 2px; margin: 0 auto 2rem;
        }
        .contact-info {
            display: flex; gap: 1.5rem;
            justify-content: center; flex-wrap: wrap;
        }
        .contact-info a {
            color: rgba(255,255,255,0.75);
            text-decoration: none; font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px; transition: all 0.3s ease;
            background: rgba(255,255,255,0.04);
        }
        .contact-info a:hover {
            background: rgba(230,57,70,0.2);
            border-color: rgba(230,57,70,0.5); color: white;
        }
        .scroll-note {
            position: fixed; bottom: 155px; width: 100%;
            text-align: center; color: rgba(255,255,255,0.3);
            font-size: 0.72rem; letter-spacing: 2px;
            z-index: 20; pointer-events: none;
        }
    </style>
</head>
